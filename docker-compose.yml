version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: clinic-history-api
    restart: unless-stopped
    environment:
      DB_HOST: ${DB_HOST:-aws-1-us-east-1.pooler.supabase.com}
      DB_PORT: ${DB_PORT:-6543}
      DB_NAME: ${DB_NAME:-postgres}
      DB_USER: ${DB_USER:-postgres.qakjgfzkslgcukhyfqeg}
      DB_PASSWORD: ${DB_PASSWORD}
      API_PORT: 3000
      TOKEN_SECRET_KEY: ${TOKEN_SECRET_KEY:-change_this_in_production}
      APP_EMAIL: ${APP_EMAIL}
      APP_EMAIL_PASS: ${APP_EMAIL_PASS}
      NODE_ENV: production
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - api_uploads:/app/public/files
      - api_images:/app/public/images
    networks:
      - clinic-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend
  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: clinic-history-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - clinic-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  clinic-network:
    driver: bridge

volumes:
  api_uploads:
    driver: local
  api_images:
    driver: local
